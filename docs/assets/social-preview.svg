<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="Open Sans, Roboto, Liberation Sans, Noto Sans, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#111a29"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.14" cy="0.16" r="0.7">
      <stop offset="0" stop-color="#1b3a55" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1b3a55" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- accent motif: mini bar chart (nods to the comparison tool) -->
  <g opacity="0.9">
    <rect x="1074" y="150" width="26" height="70"  rx="4" fill="#22d3ee"/>
    <rect x="1110" y="112" width="26" height="108" rx="4" fill="#34d399"/>
    <rect x="1146" y="176" width="26" height="44"  rx="4" fill="#fbbf24"/>
    <rect x="1182" y="96"  width="26" height="124" rx="4" fill="#a78bfa"/>
  </g>

  <!-- title -->
  <rect x="64" y="72" width="13" height="104" rx="4" fill="#22d3ee"/>
  <text x="96" y="168" font-size="128" font-weight="800" fill="#f0f6fc" letter-spacing="-2">modelx</text>

  <!-- tagline -->
  <text x="98" y="226" font-size="41" font-weight="600" fill="#c9d1d9">A terminal UI &amp; CLI for exploring LLM models</text>
  <text x="98" y="272" font-size="27" fill="#8b949e">browse &#183; compare &#183; query &#8212; 167 providers &#183; ~5,700 models &#183; models.dev</text>

  <!-- terminal window -->
  <rect x="64" y="316" width="1152" height="262" rx="15" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="98"  cy="346" r="7" fill="#ff5f56"/>
  <circle cx="122" cy="346" r="7" fill="#ffbd2e"/>
  <circle cx="146" cy="346" r="7" fill="#27c93f"/>
  <text x="170" y="351" font-size="19" fill="#6e7681" font-family="IBM Plex Mono, DejaVu Sans Mono, Liberation Mono, monospace">modelx &#8212; query</text>

  <g font-family="IBM Plex Mono, DejaVu Sans Mono, Liberation Mono, Noto Sans Mono, monospace" font-size="26" xml:space="preserve">
    <text x="100" y="404"><tspan fill="#34d399">$ </tspan><tspan fill="#f0f6fc">modelx models --filter "context_limit&gt;=1000000" --sort input_cost</tspan></text>
    <text x="100" y="446" fill="#6e7681">  PROVIDER    MODEL                CONTEXT   INPUT $/M</text>
    <text x="100" y="484" fill="#c9d1d9">  google      gemini-3-flash       <tspan fill="#22d3ee">1.0M    </tspan>  <tspan fill="#34d399">$0.30</tspan></text>
    <text x="100" y="520" fill="#c9d1d9">  google      gemini-3-pro         <tspan fill="#22d3ee">2.0M    </tspan>  <tspan fill="#34d399">$1.25</tspan></text>
    <text x="100" y="556" fill="#c9d1d9">  anthropic   claude-opus-4-5      <tspan fill="#22d3ee">1.0M    </tspan>  <tspan fill="#34d399">$5.00</tspan></text>
  </g>

  <!-- footer -->
  <g font-size="23" fill="#8b949e">
    <text x="64" y="614">Linux &#183; macOS &#183; Windows &#183; FreeBSD</text>
    <text x="1216" y="614" text-anchor="end">Built in Rust with ratatui</text>
  </g>
</svg>
