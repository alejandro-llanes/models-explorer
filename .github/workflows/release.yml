name: Release

# Publish a GitHub Release with prebuilt `modelx` binaries whenever a version
# tag is pushed (e.g. `v0.1.0`). Can also be run manually via the Actions tab
# ("Run workflow") by supplying a tag name.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write # needed to create the release and upload assets

env:
  BIN: modelx
  VERSION: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # Build + package one archive per platform.
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, musl: true }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, arm: true }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl toolchain
        if: matrix.musl
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> "$GITHUB_ENV"

      - name: Install aarch64 cross linker
        if: matrix.arm
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} --bin ${{ env.BIN }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dir="${BIN}-${VERSION}-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/${BIN}" "$dir/"
          cp README.md LICENSE "$dir/"
          tar czf "${dir}.tar.gz" "$dir"
          shasum -a 256 "${dir}.tar.gz" > "${dir}.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "${env:BIN}-${env:VERSION}-${{ matrix.target }}"
          New-Item -ItemType Directory $dir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN}.exe" $dir
          Copy-Item README.md, LICENSE $dir
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"
          $hash = (Get-FileHash "$dir.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $dir.zip" | Out-File "$dir.zip.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            *.tar.gz
            *.tar.gz.sha256
            *.zip
            *.zip.sha256
          if-no-files-found: error

  # FreeBSD has no native GitHub runner, so build inside a VM.
  build-freebsd:
    name: Build x86_64-unknown-freebsd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & package in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          envs: "BIN VERSION"
          prepare: pkg install -y rust
          run: |
            cargo build --release --locked --bin "$BIN"
            dir="${BIN}-${VERSION}-x86_64-unknown-freebsd"
            mkdir "$dir"
            cp "target/release/${BIN}" "$dir/"
            cp README.md LICENSE "$dir/"
            tar czf "${dir}.tar.gz" "$dir"
            sha256 "${dir}.tar.gz" > "${dir}.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: x86_64-unknown-freebsd
          path: |
            *.tar.gz
            *.tar.gz.sha256
          if-no-files-found: error

  # Collect every archive and publish the GitHub Release.
  release:
    name: Publish release
    needs: [build, build-freebsd]
    runs-on: ubuntu-latest
    if: ${{ always() }} # still publish whatever built, even if one target failed
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          generate_release_notes: true
          files: dist/**
