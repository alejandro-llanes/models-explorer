name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build + run the full test suite on the three first-class GitHub runners.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --verbose
      - name: Test
        run: cargo test --workspace --verbose

  # Formatting + lints only need to run once (they are platform-independent).
  lint:
    name: Rustfmt & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Rustfmt
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Build the Docker image and smoke-test that the binary runs in-container.
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t modelx:ci .
      - name: Binary runs in the container
        run: docker run --rm modelx:ci --version
      - name: fields command works with no cache or network
        run: docker run --rm modelx:ci fields | head -3

  # FreeBSD isn't a native GitHub runner, so build + test inside a VM.
  freebsd:
    name: Test (freebsd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & test in a FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y rust
          run: |
            cargo build --workspace
            cargo test --workspace
